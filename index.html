<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> Anandhanunni ❤️ Amrutha</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Great Vibes';
  overflow-x:hidden;
  color:#2b1b0f;
}

/* 🛕 BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    url('https://www.transparenttextures.com/patterns/mandala.png'),
    linear-gradient(180deg,#fff3e6,#fffaf3);
  opacity:.5;
  z-index:-3;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top,#ffb84d33,transparent 60%),
    radial-gradient(circle at bottom,#ff3b3b22,transparent 70%);
  z-index:-2;
}

/* 🌸 FLOATING */
.flowers{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:5;
}

.float{
  position:absolute;
  animation:fall linear infinite;
  opacity:.8;
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(110vh);opacity:0}
}

/* 🛕 HEADER */
header{
  height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  text-align:center;
}

header::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('./hero.jpg') center/cover;
  filter:blur(4px) brightness(.55) saturate(1.2);
  transform:scale(1.1);
}

header::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom,rgba(90,0,0,.55),rgba(0,0,0,.7)),
    radial-gradient(circle at center, rgba(255,215,0,0.25), transparent 70%);
}

.hero{
  z-index:2;
  color:#fff;
}

/* TEXT */
h1{
  font-size:50px;
  color:#ffd700;
}

.highlight{
  font-size:18px;
  margin-top:8px;
}

/* 🔥 PREMIUM COUNTDOWN */
.countdown-box{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
  flex-wrap:wrap;
}

.time{
  min-width:75px;
  padding:12px 10px;
  border-radius:14px;
  text-align:center;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border:1px solid rgba(255,215,0,0.35);
  box-shadow:0 0 15px rgba(255,215,0,0.25);
  transition:.3s;
}

.time:hover{
  transform:translateY(-6px) scale(1.08);
  box-shadow:0 0 25px rgba(255,215,0,0.6);
}

.time span{
  font-size:26px;
  font-weight:bold;
  display:block;
  color:#ffd700;
  font-family:'Poppins';
  animation:pulse 2s infinite;
}

.time small{
  font-size:11px;
  color:#fff3e6;
}

@keyframes pulse{
  from{ text-shadow:0 0 5px #ffd700; }
  to{ text-shadow:0 0 20px #ffd700; }
}

/* 📜 CARDS */
section{
  max-width:650px;
  margin:22px auto;
  padding:22px;
  text-align:center;
  background:rgba(255,255,255,.92);
  border-radius:18px;
  border:1px solid rgba(255,140,0,.3);
  box-shadow:0 12px 30px rgba(255,140,0,.2);
  opacity:0;
  transform:translateY(40px);
  transition:.8s ease;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

.title{
  padding:6px 14px;
  border-radius:30px;
  background:linear-gradient(90deg,#d97706,#b91c1c);
  color:#fff;
}

.names{
  font-size:36px;
  color:#7c2d12;
}

.round{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #f59e0b;
}

/* ❤️ HEARTS FIXED */
.love{
  position:fixed;
  bottom:-30px;
  font-size:20px;
  pointer-events:none;
  animation:floatUp linear forwards;
  z-index:9999;
}

@keyframes floatUp{
  0%{
    transform:translateY(0) translateX(0) scale(1);
    opacity:1;
  }
  50%{
    transform:translateY(-60vh) translateX(25px) scale(1.3);
  }
  100%{
    transform:translateY(-120vh) translateX(-25px) scale(1.6);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="flowers"></div>

<header>
  <div class="hero">
    <h1>Anandhanunni <br>❤️<br> Amrutha</h1>

    <div class="highlight">🪔 Divine Blessings</div>

    <div>
      🗓 May 3rd, 2026 <br>
      🪔 Muhurtham: 11:55 AM – 12:15 PM
    </div>

    <div class="countdown-box">
      <div class="time"><span id="days">00</span><small>Days</small></div>
      <div class="time"><span id="hours">00</span><small>Hours</small></div>
      <div class="time"><span id="minutes">00</span><small>Min</small></div>
      <div class="time"><span id="seconds">00</span><small>Sec</small></div>
    </div>

  </div>
</header>

<section>
  <div class="title">Groom</div>
  <div class="names">Anandhanunni</div>
  <img class="round" src="groom.jpg">
</section>

<section>
  <div class="title">Bride</div>
  <div class="names">Amrutha</div>
  <img class="round" src="bride.jpg">
</section>

<script>

/* 🌸 FLOWERS */
const flowers=document.querySelector('.flowers');
const emojis=["🌸","🌼","🪔"];

for(let i=0;i<25;i++){
  const d=document.createElement('div');
  d.className="float";
  d.innerHTML=emojis[Math.random()*3|0];
  d.style.left=Math.random()*100+"vw";
  d.style.animationDuration=(5+Math.random()*6)+"s";
  flowers.appendChild(d);
}

/* ❤️ HEARTS FIXED */
setInterval(()=>{
  const love=document.createElement("div");
  love.className="love";
  love.innerHTML="❤️";

  love.style.left=Math.random()*100+"vw";
  love.style.fontSize=(16 + Math.random()*24)+"px";

  const duration=4 + Math.random()*4;
  love.style.animationDuration=duration+"s";

  document.body.appendChild(love);
  setTimeout(()=>love.remove(), duration*1000);

},250);

/* ⏳ COUNTDOWN */
const weddingDate=new Date("May 3, 2026 11:55:00").getTime();

setInterval(()=>{
  const now=new Date().getTime();
  const gap=weddingDate-now;

  document.getElementById("days").innerText=Math.floor(gap/(1000*60*60*24));
  document.getElementById("hours").innerText=Math.floor((gap/(1000*60*60))%24);
  document.getElementById("minutes").innerText=Math.floor((gap/(1000*60))%60);
  document.getElementById("seconds").innerText=Math.floor((gap/1000)%60);
},1000);

</script>

</body>
</html>
